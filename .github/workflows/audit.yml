name: audit

# Supply-chain / advisory gate: runs cargo-audit (RUSTSEC) and cargo-deny
# (advisories, bans, sources, licenses) on every push/PR and weekly so a
# newly disclosed advisory against an existing dependency is caught even
# without a code change.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays 07:00 UTC — catch advisories disclosed since the last push.
    - cron: "0 7 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Pin tool versions so the gate is reproducible and does not flake when a
  # new tool release changes behaviour. Bump deliberately.
  CARGO_AUDIT_VERSION: "0.21.2"
  CARGO_DENY_VERSION: "0.20.2"

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version "${CARGO_AUDIT_VERSION}"
      - name: Run cargo audit
        # Ignored advisories (see deny.toml for full rationale):
        #  RUSTSEC-2023-0071 rsa Marvin — reachable only via octocrab GitHub-App JWT (unused, dead path)
        #  RUSTSEC-2026-0002 lru unsoundness — transitive via ratatui, not attacker-controlled
        #  RUSTSEC-2024-0436 paste unmaintained — build-time proc-macro via ratatui, no runtime surface
        run: >
          cargo audit --deny warnings
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2026-0002
          --ignore RUSTSEC-2024-0436

  cargo-deny:
    name: cargo deny (advisories, bans, sources, licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version "${CARGO_DENY_VERSION}"
      - name: Run cargo deny
        run: cargo deny check advisories bans sources licenses
