name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
        env:
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_SYSTEM: /dev/null

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build rustdoc (catches broken intra-doc links)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  examples:
    name: examples smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release binary
        run: cargo build --release -p hawser
      - name: Validate every shipped example manifest with `haw tree`
        shell: bash
        run: |
          set -euo pipefail
          HAW="$PWD/target/release/haw"
          # Top-level manifest plus one-level-deep example manifests.
          shopt -s nullglob
          manifests=(examples/haw.toml examples/*/haw.toml)
          if [ ${#manifests[@]} -eq 0 ]; then
            echo "::error::no example manifests found under examples/"
            exit 1
          fi
          fail=0
          for m in "${manifests[@]}"; do
            echo "── haw tree --manifest $m ──"
            if ! "$HAW" tree --manifest "$m"; then
              echo "::error file=$m::haw tree failed for $m"
              fail=1
            fi
          done
          exit $fail
