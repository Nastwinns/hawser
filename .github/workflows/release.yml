name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            musl: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install musl toolchain (x86_64 linux musl)
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release -p hawser --target ${{ matrix.target }}

      - name: Resolve version
        id: v
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VER="${{ steps.v.outputs.version }}"
          NAME="haw-${VER}-${{ matrix.target }}"
          DIR="target/${{ matrix.target }}/release"
          tar -czf "${NAME}.tar.gz" -C "$DIR" haw
          shasum -a 256 "${NAME}.tar.gz" | awk '{print $1}' > "${NAME}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ver = "${{ steps.v.outputs.version }}"
          $name = "haw-$ver-${{ matrix.target }}"
          $dir = "target/${{ matrix.target }}/release"
          Compress-Archive -Path "$dir/haw.exe" -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() | Out-File -Encoding ascii -NoNewline "$name.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: haw-${{ matrix.target }}
          path: |
            haw-*.tar.gz
            haw-*.zip
            haw-*.sha256

  linux-packages:
    name: linux distro packages (.deb / .rpm)
    needs: build
    runs-on: ubuntu-latest
    # A packaging failure must not block the core release.
    continue-on-error: true
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-packages

      - name: Install cargo-deb and cargo-generate-rpm
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Resolve version
        id: v
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binary (gnu)
        run: cargo build --release -p hawser --target "$TARGET"

      - name: Build .deb (cargo-deb infers metadata from Cargo.toml)
        shell: bash
        run: |
          set -euo pipefail
          # --no-build reuses the binary compiled above; pass fields cargo-deb
          # cannot infer from the (crate-metadata-free) Cargo.toml via CLI flags.
          cargo deb -p hawser --no-build --target "$TARGET" \
            --deb-version "${{ steps.v.outputs.version }}" \
            --section utils
          mkdir -p pkg
          cp target/"$TARGET"/debian/*.deb pkg/

      - name: Build .rpm (assets injected via --metadata-overwrite, no crate edit)
        shell: bash
        run: |
          set -euo pipefail
          # cargo-generate-rpm requires a [package.metadata.generate-rpm]
          # `assets` table, which the (crate-metadata-free) Cargo.toml lacks.
          # Since we cannot edit crates/, supply it at build time via an
          # overlay TOML merged over the crate metadata with --metadata-overwrite.
          cat > rpm-meta.toml <<EOF
          [package.metadata.generate-rpm]
          summary = "haw: multi-repo product composition and cross-repo MR orchestration"
          assets = [
            { source = "target/${TARGET}/release/haw", dest = "/usr/bin/haw", mode = "0755" },
          ]
          EOF
          cargo generate-rpm \
            --package crates/hawser \
            --target "$TARGET" \
            --metadata-overwrite rpm-meta.toml \
            --payload-compress none
          mkdir -p pkg
          cp target/"$TARGET"/generate-rpm/*.rpm pkg/ 2>/dev/null || \
            cp target/generate-rpm/*.rpm pkg/

      - name: Checksums for packages
        shell: bash
        run: |
          set -euo pipefail
          cd pkg
          for f in *.deb *.rpm; do
            [ -e "$f" ] || continue
            shasum -a 256 "$f" | awk '{print $1}' > "${f}.sha256"
          done
          ls -l

      - uses: actions/upload-artifact@v4
        with:
          name: haw-linux-packages
          path: |
            pkg/*.deb
            pkg/*.rpm
            pkg/*.sha256

  release:
    needs: [build, linux-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve version
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Render packaging manifests with real checksums
        run: |
          VER="${{ steps.v.outputs.version }}"
          cd artifacts
          sha() { cat "haw-${VER}-$1"; }
          python3 "$GITHUB_WORKSPACE/packaging/render.py" "$VER" \
            "$(sha aarch64-apple-darwin.tar.gz.sha256)" \
            "$(sha x86_64-apple-darwin.tar.gz.sha256)" \
            "$(sha x86_64-unknown-linux-gnu.tar.gz.sha256)" \
            "$(sha x86_64-pc-windows-msvc.zip.sha256)"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        continue-on-error: true

      - name: Sign archives with cosign (keyless, OIDC)
        continue-on-error: true
        env:
          COSIGN_YES: "true"
        run: |
          cd artifacts
          shopt -s nullglob
          for archive in haw-*.tar.gz haw-*.zip; do
            cosign sign-blob --yes \
              --output-signature "${archive}.sig" \
              --output-certificate "${archive}.pem" \
              "$archive"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: haw ${{ steps.v.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/haw-*.tar.gz
            artifacts/haw-*.zip
            artifacts/haw-*.sha256
            artifacts/haw-*.sig
            artifacts/haw-*.pem
            artifacts/*.deb
            artifacts/*.rpm
            dist/hawser.rb
            dist/hawser.json
