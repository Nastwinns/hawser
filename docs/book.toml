[book]
title = "hawser — the beam that binds the repos"
description = "Reproducible multi-repo stacks + cross-repo PR/MR orchestration, in Rust."
authors = ["hawser contributors"]
language = "en"
src = "."

[build]
build-dir = "book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/Nastwinns/keelson"
edit-url-template = "https://github.com/Nastwinns/keelson/edit/main/docs/{path}"
additional-css = []

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
