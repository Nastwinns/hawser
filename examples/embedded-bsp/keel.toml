# Embedded/BSP example: a Zephyr-style firmware stack.
# Branch revs follow their head until `keel lock` pins them.

[remote.zephyr]
url = "https://github.com/zephyrproject-rtos"

[repo.zephyr]
remote = "zephyr"
repo = "zephyr"
rev = "v3.6.0"
groups = ["core"]

[repo.hal_stm32]
remote = "zephyr"
repo = "hal_stm32"
rev = "main"
path = "modules/hal/stm32"
groups = ["hal"]
deps = ["zephyr"]

[repo.mcuboot]
remote = "zephyr"
repo = "mcuboot"
rev = "main"
path = "bootloader/mcuboot"
groups = ["boot"]
deps = ["zephyr"]

[stack.stm32-board]
repos = ["zephyr", "hal_stm32", "mcuboot"]

[stack.qemu-sim]
repos = ["zephyr"]

# `keel lock --overlay bleeding-edge` re-resolves kernel deps on their heads.
[overlay.bleeding-edge.repo.zephyr]
rev = "main"
